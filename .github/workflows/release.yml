name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      reason: { description: 'Manual release trigger', required: false }

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  version:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - id: v
        run: echo "version=$(perl .github/workflows/scripts/version.pl)" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    uses: ./.github/workflows/_build.yml
    with:
      version: ${{ needs.version.outputs.version }}
      release-kind: release
      changelog-flag: --release ${{ github.ref_name }}

  publish-github:
    needs: [version, build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: "${{ needs.build.outputs.exe-artifact }}",   path: dist }
      - uses: actions/download-artifact@v4
        with: { name: "${{ needs.build.outputs.nuget-artifact }}", path: dist }

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          files: |
            dist/*.zip
            dist/*.nupkg
          generate_release_notes: true

  publish-nuget:
    needs: [version, build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: "${{ needs.build.outputs.nuget-artifact }}", path: artifacts }
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.x' }
      - run: dotnet nuget push artifacts/*.nupkg -k "${{ secrets.NUGET_TOKEN }}" -s https://api.nuget.org/v3/index.json --skip-duplicate
